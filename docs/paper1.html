<script id="md" type="text/markdown"># 年齢同期型メディア世代論：社会事象の作用ベクトルとライフステージ感受性窓から世代を再構成する

**The Situated Cohort Exposure Model (SCEM): Reconstructing Generations from Social Event Impact Vectors and Life-Stage Sensitivity Windows**

Masamichi Iizumi¹*, Tamaki Iizumi¹

¹ Miosync, Inc. — Independent Research
\* Corresponding author: m.iizumi@miosync.email

**Preprint version 1.0 — 2026-06-24**
*Submitted to SocArXiv. This is a working preprint intended to establish priority of the model. Empirical validation (Prolific panel) and the extended 3C framework are deferred to Paper 2.*

---

## Abstract

「世代」は、社会科学とマーケティング実務の双方で日常的に用いられながら、その定義はほとんど常に**出生年コホート**(団塊／X／Y／Z世代)に依存してきた。本稿はこの前提を棄却する。我々の中心的主張は次の一文に集約される——**世代とは出生年コホートではなく、社会事象の「作用ベクトル」が認知発達上の感受性窓(life-stage sensitivity windows)にどう着弾したかで決まる連続プロファイルである。**

我々はこの主張を計算可能な形で定式化し、このモデルを **Situated Cohort Exposure Model(SCEM、状況づけられたコホート曝露モデル)** と呼ぶ。各社会事象に対して、(1) 作用モード別の非対称ガウス型**感受性カーブ**(個別ピーク優先ハイブリッド)、(2) 受動着弾(PASSIVE)／能動分岐(ACTIVE)／参照点書き換え(REFRAME)の**3作用モード**、(3) 後続事象との対数比で発火する**REFRAME差分式**、(4) 作用ベクトルの**コサインによる被り判定**(領域ラベルに非依存)、(5) 同一認知段階バンドへの同時着弾を**作用直交性で重み付ける干渉ノード**、を与える。出典付きの社会事象データベース(日本、156件)を入力として、任意の出生年について「3軸作用プロファイル(世代指紋)」を出力する。

SCEM は**集団の曝露構造**を対象とするモデルであり、構造層(本稿の中核)・Community層(環境による変調)・Culture層(仮説生成器)からなる。重要な設計境界として、**個人の自己効力感・個人差・個人内の「知る／なる」ギャップは意図的に射程外**に置く(§2.4)——本モデルが説明するのは「誰がどの作用にどう曝されたか」という集団的布置であって、個人がそれをどう生きたかではない。

例として1981年生まれは PASSIVE 0.81 / ACTIVE 0.56 / REFRAME 0.55 という指紋を持ち、9世代バッチ(1970–2010、5年刻み)では PASSIVE 密度が1980–85年生まれでピーク(0.80)を取った後に減衰する非単調な構造が観察された。さらに構造プロファイルを条件として大規模言語モデルに「その世代が思春期に持っていた文化選択肢空間」を生成させると、1985→1990年生まれ、1995→2000年生まれの境界で選択肢空間そのものの断絶(「掘る文化→流される文化」「アイドル前提→TikTok前提」)が観測された。

本モデルは、Mannheim (1928) の定性的世代論を計算可能にし、Strauss & Howe (1991) の恣意的カットオフを連続関数に置き換える。文化層(後半)はあくまで**仮説生成器**として位置づけ、その実証はPaper 2に委ねる。

**Keywords:** generations, cohort analysis, situated cohort exposure model (SCEM), collective exposure structure, media theory, cognitive development, sensitive periods, life-stage sensitivity windows, computational sociology, hypothesis generation

## Abstract (English)

"Generation" is used routinely across both social science and marketing practice, yet it is almost always defined by **birth-year cohorts** (Boomers / X / Y / Z). This paper rejects that premise. Our central claim is a single sentence: **a generation is not a birth-year cohort but a continuous profile determined by how the "impact vectors" of social events land on the developmental sensitivity windows (life-stage sensitivity windows) of cognitive development.**

We formalize this claim computationally as the **Situated Cohort Exposure Model (SCEM)**. For each social event we specify (1) an asymmetric-Gaussian **sensitivity curve** over age (individual-peak-priority hybrid), (2) three **modes of impact** — passive imprinting (PASSIVE), forced decision (ACTIVE), and reference-point rewriting (REFRAME), (3) a **REFRAME firing rule** based on the log-ratio of reference values of successive events, (4) a **cosine-based redundancy test** over impact vectors (label-free of any domain category), and (5) **interference nodes** that weight co-impacts on the same cognitive band by their *impact orthogonality* ($D = 1.6 - 1.05\cos$). Given a sourced database of social events (Japan, n=156), SCEM outputs a three-axis impact profile (a "cohort fingerprint") for any birth year.

SCEM targets **collective exposure structure** and is organized into a structural layer (the core here), a Community layer (situated modulation by environment), and a Culture layer (a hypothesis generator). It deliberately places individual interiority (self-efficacy), the individual "knowing-vs-becoming" lag, and regional diffusion dynamics **out of scope**, so that what it does and does not explain is declared in advance.

As an illustration, the 1981 birth cohort has a fingerprint of PASSIVE 0.81 / ACTIVE 0.56 / REFRAME 0.55; across nine cohorts (1970–2010, 5-year steps) PASSIVE density peaks non-monotonically at the 1980–85 cohorts (0.80) and then declines. Conditioning a large language model on the structural profile to generate "the cultural option space available in adolescence" reveals ruptures of the option space itself at the 1985→1990 and 1995→2000 boundaries ("digging culture → drifting culture"; "idol-premised → TikTok-premised"). SCEM makes Mannheim's (1928) qualitative theory computable and replaces Strauss & Howe's (1991) arbitrary cutoffs with continuous functions. The Culture layer is positioned strictly as a hypothesis generator; its empirical validation is deferred to Paper 2.

## 1. Introduction

### 1.1 マーケティングの「Z世代論」はなぜ壊れているのか

筆者(Iizumi)はもともとマーケティングの実務に身を置いていた。そこで日々目にしたのは、「Z世代は〜だ」「ミレニアル世代は〜を好む」という語りが、ほとんど検証不能なまま意思決定の根拠として流通している光景である。これらの世代論には共通する三つの欠陥がある。

第一に、**カットオフが恣意的**である。Z世代の開始年は論者によって1995年であったり1997年であったり2000年であったりする。境界は事後的に引かれ、なぜそこなのかという演繹的根拠を持たない。

第二に、**反証不能**である。「Z世代はデジタルネイティブだ」という命題は、どんな観察によっても否定されない。なぜなら、それを否定する個体が現れれば「その人は例外だ」あるいは「Z世代らしくない」と再記述されるからである。命題が反例を吸収してしまう。実際、職務態度を対象とした大規模メタ分析は、「世代」によって説明される差は通説に反してごく小さいことを示しており (Costanza et al., 2012)、生年に基づく世代区分そのものの説明力に疑問が投げかけられている (Duffy, 2021)。

第三に、**出生年という単一軸への還元**である。同じ年に生まれても、ある人は14歳で阪神淡路大震災を「人格形成期」に食らい、別の人(数年違い)は同じ事象を「原風景期」に食らう。前者にとって安全神話の崩壊は世界観の前提を書き換える出来事だが、後者にとっては物心つく前の背景でしかない。出生年コホートはこの差を消してしまう。

本稿は、これら三つの欠陥を同時に解消する計算可能なモデルを提案する。

### 1.2 先行研究との位置づけ

世代を社会理論として最初に厳密に扱ったのは Mannheim (1928) である。彼の「世代の問題(Das Problem der Generationen)」は、世代を単なる出生年の束ではなく、青年期に共有された歴史的経験によって形成される「世代単位(Generationseinheit)」として捉えた。この洞察——**世代は出生年ではなく経験の共有で決まる**——は本稿の出発点でもある。しかし Mannheim の枠組みは定性的であり、誰がどの程度どの経験を共有したかを**計算する手段を持たない**。

Strauss & Howe (1991) は世代を約20年周期の四つの元型(Prophet/Nomad/Hero/Artist)が循環するモデルとして提示し、大衆的な影響力を持った。しかしそのカットオフは周期律ありきで事後的に当てはめられたものであり、**反証可能な予測**を生まない。境界の正当化はナラティブに依存している。

両者に共通するのは、(a) 出生年あるいはそれに準じる粗い区切りに依存していること、(b) **実証的検証の手続きを欠いている**ことである。本稿のモデルも現段階では大規模な実証を伴わない点では同じ土俵にある。しかし決定的に異なるのは、**ルールを先に固定し、そこから個別世代を演繹する**設計になっており、原理的に検証可能である点である(§6.3)。

コホートを社会変化の概念単位として確立したのは Ryder (1965) であり、以後の Age–Period–Cohort (APC) 分析は、年齢効果・時代効果・コホート効果を統計的に分離しようとしてきた (Glenn, 2005; Yang & Land, 2013)。しかしAPCモデルは識別問題(年齢=時代−コホートという線形従属のため三効果が一意に定まらない)を本質的に抱え (Mason et al., 1973)、かつ「コホート」を依然として出生年で定義する。本稿は逆に、**コホートを出生年から解放し、事象×年齢×作用モードのテンソルとして再定義する**。

本モデルの感受性カーブ(§3.2)に最も近い先行研究は、政治的社会化における **impressionable-years 仮説**である。Krosnick & Alwin (1989) は態度変容への感受性が思春期〜成人初期に高く以後急減することを示し、Schuman & Scott (1989) は集合的記憶として想起される歴史的出来事が当人の10代〜20代前半に集中することを実証した。さらに Ghitza, Gelman & Auerbach (2023) は、大統領選投票を「政治的出来事の累積印象が**年齢で重み付け**され、思春期〜成人初期にピークを持つ」モデルで再現した。本稿はこの年齢重み付けの発想を、政治態度に限らず11領域・3作用モードへと一般化し、かつ事象間の作用ベクトルの独立性まで扱う点で拡張する。

### 1.3 本稿の貢献と中心的主張

> **中心的主張(Core Claim):**
> 世代とは出生年コホートではなく、**社会事象の作用ベクトルが認知発達上の感受性窓にどう着弾したかで決まる連続プロファイル**である。

この主張を支えるために、本稿は **Situated Cohort Exposure Model(SCEM)** を導入し、以下を構成要素とする。

1. **作用モードの3分類**(§3.1):同じ事象でも、それが身体に刷り込まれた(PASSIVE)か、意思決定を強制した(ACTIVE)か、基準値を書き換えた(REFRAME)かを区別する。とりわけ REFRAME(参照点書き換え、差分発火)は既存の世代論に存在しない新規の概念である。
2. **領域×モード別の感受性カーブ**(§3.2):発達上の感受性窓(神経科学の臨界期・感受性期からの類推、§2.2)を、年齢に対する非対称ガウス型の重み関数として操作化する。
3. **作用ベクトルによる被り判定と干渉ノード**(§3.4–3.5):事象そのものの数ではなく、作用が独立か被っているかをコサイン類似度で判定し(領域ラベル非依存)、二重計上を防ぐ。さらに「同じ認知段階バンドへの同時着弾」を世代依存の干渉として捉える。
4. **計算可能な世代指紋**(§4):任意の出生年に対し3軸プロファイルを出力するエンジンと、出典付きの156件の社会事象データベースを提供する。
5. **イベントを単一カテゴリに潰さないベクトルネイティブ設計**(§3.4, §6.1):中心的主張(離散カテゴリを拒む)をイベント側にも自己適用し、被り判定・干渉を領域ラベルではなく作用ベクトルの幾何から導く。

本稿の射程(Paper 1)は SCEM の**構造層**(3軸モデル)とその上に乗る**Culture層**(おまけ、仮説生成器)に限る。SCEM の **Community層**(環境による曝露変調、§2.4)の完全な実装・実証、3C(Culture/Community/Code)への拡張、Prolific を用いた実証は Paper 2 に譲る(§6)。

## 2. Conceptual Framework

### 2.1 着弾(impact)というメタファ

本モデルの基本単位は**着弾(impact)**である。社会事象 $e$ は、ある暦年 $y_e$ に発生し、出生年 $b$ の個人にとっては年齢 $a = y_e - b$ の時点で着弾する。同じ事象であっても、着弾した年齢が異なれば、その人の発達段階が異なるため、作用の質と強度が変わる。

ここで重要なのは、事象の「発生年」と「作用年」を区別することである。技術や制度は発表された年(launch)ではなく、社会に普及して人々の日常に食い込んだ年(diffusion)に作用する。データベースは両者を `year`(launch)と `effective_year`(diffusion)として保持し、作用計算には `effective_year` を優先する(§4.1)。例えばファミコンは1983年発売だが、子どもの日常娯楽として定着した作用年は1985年として扱う。

### 2.2 認知発達の段階バンド

着弾年齢を、認知発達の質的に異なる7つのバンドに区分する(Table 1)。これは Piaget (1952) 的発達段階や、神経科学における臨界期・感受性期(critical / sensitive period;特定の経験が神経回路の形成に不可逆的に作用する発達上の窓)の知見 (Lenneberg, 1967; Knudsen, 2004; Hensch, 2005) を世代論の文脈に翻案したものであり、各バンドは「その時期に着弾した事象が、後年どのような形で尾を引くか」の質を規定する。臨界期は本来ミクロな神経可塑性の概念だが、本稿はそれを「社会事象が認知段階に応じて異なる強度で作用する」というマクロな **感受性窓(life-stage sensitivity window)** へと類推的に拡張する。神経科学的な臨界期そのものを主張するのではなく、年齢依存の作用強度を表す操作的構成物として「感受性窓」という語を用いる(この類推の限界は §6.5 で述べる)。

**Table 1. 認知発達の段階バンド**

| バンド | 年齢 | 名称 | 着弾の質 |
|---|---|---|---|
| B1 | 0–5 | 原風景期 | 物心つく前の背景。懐かしさの最下層。 |
| B2 | 6–11 | 身体記憶期 | 遊び・操作感覚として身体化。 |
| B3 | 12–17 | 人格形成期 | 価値観・自己像の核。最も尾を引く。 |
| B4 | 18–22 | 社会接続期 | 社会との接続様式を決める。 |
| B5 | 23–29 | 成人初期適応期 | キャリア・生活の初期設定。 |
| B6 | 30–39 | 社会実装期 | 既存の枠組みの中での実装・運用。 |
| B7 | 40+ | 再定義期 | 蓄積された基準の再定義。 |

人格形成期(B3, 12–17歳)は Mannheim の青年期経験に対応する核となるバンドであり、本モデルでも各世代の「原体験」を抽出する際の主たる窓として用いる。

### 2.3 なぜ作用モードを分けるのか

既存の世代論は事象を一様に「経験した／しなかった」の二値で扱う。しかし同じ事象でも作用の仕方は質的に異なる。震災を14歳で「安全神話が崩れる体験」として食らうこと(PASSIVE)と、就職という意思決定が氷河期で歪むこと(ACTIVE)と、70円台の超円高を身体で知った後に140円台を「やばい」と感じること(REFRAME)は、別種の作用である。これらを同一の尺度に並べると情報が潰れる。本モデルは3モードを**同列に合算せず、別々の量(3軸)として保持する**(§3.6)。

### 2.4 SCEM の層構成と射程

Situated Cohort Exposure Model(SCEM)は三つの層からなる。

- **構造層(structural layer):** 事象 × 着弾年齢 × 作用モードのテンソル。世代指紋(3軸プロファイル)・干渉・REFRAME 発火を計算する(§3)。本稿の中核。
- **Community層(situated modulation):** 環境による曝露の変調。**閉鎖度**(開放／中間／閉鎖の離散アーキタイプ)と**伝播速度**(`effective_year` を地域でずらす連続オフセット)の二軸からなる。同じ事象でも、閉鎖的な環境では具現化が遅延し選択肢空間が狭まる。本層の完全な実装・実証は Paper 2。
- **Culture層(preference branching):** 同一の構造プロファイルを持つ集団の内部で、どの嗜好系統に分岐しうるかを LLM で生成する仮説生成器(§5.3, §6.2)。

**射程(scope)とその境界.** SCEM が対象とするのは **集団の曝露構造(collective exposure structure)** ——「どの集団が、どの作用に、何歳でどう曝されたか」という布置である。次の三つは**意図的に射程外**に置く。これらは本モデルの欠落ではなく、対象を明確に保つための設計境界である。

1. **個人層(individual interiority):** 自己効力感・性格・能力など、同じ曝露を受けた個人がそれをどう生きるかの個人差。SCEM は「曝露の布置」までを記述し、そこからの個人の軌跡は説明しない。したがって「同じ世代でも人によって違う」という観察は本モデルへの反証ではない——個人差は定義上、曝露構造の下流にある自由度である。
2. **個人内の情報–具現化ラグ:** 「知る」と「なる/やる」の個人的なズレ。社会全体の普及ラグ(`effective_year − year`)は事象属性として扱えるが、個人がいつ具現化するかは Community層の環境変調として近似するにとどめ、個人時系列としては測らない。
3. **地域間の具現化波及ダイナミクス:** 流行が都市から地方へ波及する動的過程(キャズム等)。SCEM は静的な曝露布置を扱い、波及の時間発展はモデル化しない。

この境界設定により、SCEM は「説明できること」と「説明しないこと」を事前に宣言した反証可能なモデルとなる(§6.3)。

### 2.5 文脈依存モード問題(The Contextual Mode Problem)

本稿(Paper 1)では、構造層を明確にするため、各事象の**作用モード(PASSIVE/ACTIVE/REFRAME)を事象の固定属性として扱う**。しかし、**同じ事象でも、共同体の前提(宗教・階層・地域規範)によって作用モードが変わりうる**。同性婚合法化・移民政策・9.11・金融危機などはその典型である——ある共同体では「基準値を書き換える出来事(REFRAME)」が、別の共同体では「意思決定を強制する出来事(ACTIVE)」あるいは「ただ刷り込まれる背景(PASSIVE)」として着弾する。

これは SCEM の**限界ではなく、Community/Code層の必要性を示すもの**である。Paper 2 では、`Event.mode` を固定値ではなく、**Event × Community × Code(前提レイヤー)から解決される `ResolvedImpact`** として扱う(Contextual Mode Resolver)。本問題は、とりわけ国際比較・地域比較における SCEM の本丸であり、海外版 SCEM が立ち上がる地点である。

## 3. Model and Methods

本節ではエンジンの全構成要素を、実装(`media_generation_v4.py` / `media_generation_v5.py` / `event_loader.py`)に準拠して数式化する。記号の一覧は付録Aに置く。

### 3.1 作用モード(3 modes of impact)

各事象 $e$ は3つの作用モードのいずれかに割り当てられる。

- **PASSIVE(受動着弾):** 選んでいないが身体・原風景に刷り込まれたもの。質感・懐かしさ・「当たり前」感を作る。(例:ファミコン、阪神淡路大震災、プリクラ)
- **ACTIVE(能動分岐):** 進路・就職・経営・政治参加など、意思決定を強制されたもの。人生分岐の傷や癖を作る。(例:就職氷河期、選挙権18歳、新NISA)
- **REFRAME(参照点書き換え):** 基準値そのものを書き換えたもの。**後続事象との差分で発火し**、隠れた「普通」の物差しになる。(例:ドル円70円台→140円台、消費税5%→8%)

REFRAME は単独では発火しない。同じ `reframe_group` に属する過去のアンカー事象と後続のトリガー事象が揃って初めて、両者の差分として作用が立ち上がる(§3.5)。これが既存世代論にない設計である。

### 3.2 感受性カーブ(sensitivity curve)

年齢 $a$ における事象への感受性を、ピーク年齢 $\mu$ のまわりの**非対称ガウス関数**として定義する。立ち上がり(peak以前)と減衰(peak以後)で幅を変えることで、「早熟に刺さる／成人後も残る」という感受性窓の非対称性を表現する。年齢に対する単峰の重み関数を用いる点は Ghitza et al. (2023) の累積印象モデルと共通するが、本稿は領域×モードごとにピークと幅を変え、かつ非対称性と床値を導入する点で異なる。

$$
g(a;\mu,\sigma_L,\sigma_R,\phi) \;=\; \max\!\left(\phi,\; \exp\!\left[-\frac{(a-\mu)^2}{2\,\sigma(a)^2}\right]\right),
\qquad
\sigma(a)=\begin{cases}\sigma_L & a \le \mu \\[2pt] \sigma_R & a > \mu\end{cases}
$$

ここで $\mu$ はピーク年齢、$\sigma_L$ は左幅(小さいほど早熟に刺さる)、$\sigma_R$ は右幅(大きいほど成人後も残る)、$\phi$ は床値(floor;幼少期・成人後にも残る最低感受性)である。$a<0$ なら $g=0$。

**ハイブリッド指定(個別 peak 優先).** 事象が個別のピーク年齢 $\mu_e$(`sensitivity_peak_age`)を持つ場合、それを最優先で用いる:

$$
g_e(a) \;=\; g\!\left(a;\ \mu_e,\ s_e,\ 1.5\,s_e,\ 0.10\right),
$$

ここで $s_e$ は事象固有の広がり(`sensitivity_spread`、既定 6.0)。個別ピークが無い事象に対しては、領域 $d$ ×モード $m$ 別に較正された33本のフォールバックカーブ $g_{d,m}$ を用いる(付録B)。すなわち感受性は「個別値があればそれ、無ければ領域×モードの既定」という二段構えである。本研究のデータベースでは全156件に個別ピークが付与されており、フォールバックは発生しない(§4.1)。

### 3.3 モード別の作用重み(mode weight)

感受性 $s = g_e(a)$ に、モードごとの重み付けを施して事象の作用重み $w$ を得る。$\alpha_e\in[0,1]$ は事象の主体性(agency;意思決定の関与度)、$\lambda_e$ は社会的サリエンス(salience;歴史的・社会的な大きさ、概ね 0–1.5)である。

$$
w_e(a) =
\begin{cases}
s \cdot \lambda_e & (\text{PASSIVE})\\[4pt]
s \cdot (0.30 + 0.70\,\alpha_e)\cdot \lambda_e & (\text{ACTIVE})\\[4pt]
s \cdot (0.50 + 0.50\,\alpha_e)\cdot \lambda_e & (\text{REFRAME, anchor depth})
\end{cases}
$$

PASSIVE は選べない着弾なので感受性とサリエンスのみで決まる。ACTIVE は意思決定の関与度 $\alpha_e$ が強く効く。REFRAME のこの値はアンカーの「刺さり深さ」であり、実際の発火は後続トリガーとの差分と掛けて決まる(§3.5)。

### 3.4 作用ベクトルと独立性判定

事象を「数」で数えると二重計上が起きる。スーパーファミコンとPlayStationを別々に1件ずつ数えると、「家庭用ゲームによる遊び文化の刷り込み」を二重に計上してしまう。これを避けるため、各事象に**作用ベクトル** $\mathbf{v}_e \in [0,1]^K$(`effect_vector`、例:`{peer_culture:0.9, home_entertainment:1.0, game_interface:0.9}`)を与え、作用の被りをコサイン類似度で判定する。

$$
\cos(\mathbf{v}_a,\mathbf{v}_b) = \frac{\sum_k v_{a,k}\,v_{b,k}}{\|\mathbf{v}_a\|\,\|\mathbf{v}_b\|}.
$$

年差 $\Delta y = |y_a - y_b|$ を併用し、被りを4段階に分類する($\text{close} \equiv \Delta y \le 3$):

$$
\text{class}(a,b)=
\begin{cases}
\textbf{duplicate} & \text{close} \wedge \text{same mode} \wedge \cos \ge 0.82\\
\textbf{sibling} & \text{close} \wedge \cos \ge 0.70\\
\textbf{interference} & \text{close} \wedge \cos \ge 0.35\\
\textbf{independent} & \text{otherwise}
\end{cases}
$$

duplicate は代表事象に統合(二重計上回避)、sibling は親カテゴリの下位枝、interference は別作用だが近接として干渉候補、independent は独立事象として併存させる。**判定は領域(domain)ラベルに依存せず、作用ベクトルのコサイン類似度のみで行う。** 「同種の作用か」という問いは作用ベクトルの幾何が連続的に答えるため、事象を単一の領域カテゴリに割り当てる必要はない(下記の設計ノート)。

**設計ノート:イベントを単一カテゴリに潰さない.** 領域ラベル(メディア技術・プラットフォーム等)は人間が読むための記述タグにすぎず、本研究のデータでは**いかなる計算にも入力されない**。全事象が個別感受性ピークを持つため領域×モードのフォールバックカーブ(§3.2)は一度も発動せず、被り判定(§3.4)・干渉スコア(§3.5)はもともと領域に依存しないからである。事象を単一カテゴリに潰さないこの設計の理由は、本稿の中心的主張と同型である。本稿は「世代を出生年という離散カテゴリに潰すな、連続プロファイルとして扱え」と主張する。同じ論理がイベントにも適用される:**一つの社会事象を一つの領域カテゴリに潰すのは、同じ離散化の誤りである。** 東京オリンピックは公衆衛生でも国際環境でも政治制度でもあり、どれか一つではない。本モデルは事象を既に多次元の作用ベクトル $\mathbf{v}_e$ として表現しており、領域はそのベクトルを1軸に射影した冗長でロスの多い情報である。したがって被り判定(§3.4)も干渉スコア(§3.5)も、領域ラベルではなく作用ベクトルの幾何から直接導く。これにより「この事象は結局どの領域か」という解決不能な分類論争が原理的に消滅する(この設計に至った経緯と実証は §6.1)。

### 3.5 干渉ノードと REFRAME 発火

**干渉ノード(generation-dependent interference).** §3.4 の年差ベースの分類とは別に、より世代論的に重要なのは「**その人の同じ認知段階バンドに両方が着弾したか**」である。同じ「阪神淡路 × CDレンタル文化」でも、両方を14歳(人格形成期)で食らった人と、0–1歳(原風景期)で食らった人とでは質感が別物になる。よって干渉は**世代依存**でなければならない。

両事象が同一バンドに着弾した場合のみ、干渉スコアを計算する。バンド内の年齢差 $\delta a = |a_a - a_b|$、バンド幅 $W$、近接度 $p = 1 - \min(\delta a / W,\,1)$ として、

$$
\text{score}(a,b) = \underbrace{\frac{w_a + w_b}{2}}_{\text{base}} \cdot \underbrace{\big(1.6 - 1.05\,\min(\cos,1)\big)}_{\text{作用直交性 }D} \cdot (0.5 + 0.5\,p).
$$

作用が直交する($\cos\to 0$)ほど「**異なる作用の同時着弾**」として干渉が濃くなり($D\to 1.6$)、作用が同一に近い($\cos\to 1$)ほど「干渉」ではなく「被り」として減衰する($D\to 0.55$)。duplicate と判定済みのペアは干渉から除外する。

この作用直交性項 $D$ は、本モデルの初期版が用いていた二つの因子——カテゴリ的な「領域横断ボーナス(1.6倍 if cross-domain)」と連続的な「独立性ボーナス $(0.55+0.45(1-\min(\cos,0.85)))$」——を**一つに統合したもの**である。領域ラベルを廃止した結果(§3.4 設計ノート)、両因子はともに作用ベクトルの非類似性に由来する量となり二重計上を生むため、$D=1.6-1.05\cos$ に集約した。$D$ は $\cos=0$ で旧版の最大値 1.6 を正確に再現するため、上位干渉ノードの絶対スコアは保存される(§5.1)。領域ラベルの廃止がモデルの結論に与える影響の実測は §6.1 で示す。

**REFRAME 発火(reference-point rewriting).** 同一 `reframe_group` 内で、過去のアンカー事象とそれ以降のトリガー事象のすべての対について発火を計算する。差分 $\delta$ は、両者が参照値 $r$(`reference_value`、為替・物価など)を持てば対数比、無ければ年差を代理とする:

$$
\delta(a,t) =
\begin{cases}
\min\!\left(1,\ \dfrac{\log(\,\max(r_a,r_t)/\min(r_a,r_t)\,)}{\log 2}\right) & \text{both have } r\\[10pt]
\min\!\left(1,\ \dfrac{|y_t - y_a|}{10}\right) & \text{otherwise}
\end{cases}
$$

発火強度は、アンカーの刺さり深さ $w_a$(§3.3)、トリガー側の感受性込み重み $w_t$、差分 $\delta$ の積:

$$
\text{fire}(a,t) = w_a \cdot (0.35 + 0.65\,w_t) \cdot \delta(a,t).
$$

差分が無ければ($\delta=0$)発火せず、アンカーが浅くても発火しにくい。例:ドル円70円台(アンカー)を身体で知った人だけが、140円台(トリガー)で「やばい」が起動する。$\log_2(145/76)\approx 0.93$ より $\delta\approx0.93$。

### 3.6 世代指紋(cohort fingerprint)

3モードは単位が異なるため**生の合計で同列に並べない**。各モード $m$ について、着弾した事象集合 $H_m$ の作用重みから、件数・平均・上位3件平均を別々に算出する:

$$
\text{mean}_m = \frac{1}{|H_m|}\sum_{e\in H_m} w_e,\qquad
\text{top3}_m = \frac{1}{3}\sum_{e\in \text{top-3}(H_m)} w_e.
$$

3つ組 $(\text{mean}_\text{PASSIVE},\ \text{mean}_\text{ACTIVE},\ \text{mean}_\text{REFRAME})$ が、その出生年の**3次元座標=世代指紋**である。出生年は離散だが、$b$ を連続変数として動かすと指紋は連続的に変化する。ここに「世代は連続プロファイルである」という主張が操作的に実現される。

## 4. Data

### 4.1 社会事象データベース(events_patched.jsonl)

入力は出典付きの社会事象データベース、156件(日本、JSON Lines形式)。各レコードは事象名・発生年(`year`)・作用年(`effective_year`)・領域・モード・主体性・サリエンス・個別感受性ピーク・作用ベクトル・REFRAMEグループ・参照値・出典URL(`source_urls`)・信頼度等を持つ。事象の選定と属性付与は LLM(Gemini DeepResearch)による一次リサーチを基に、出典URLを各事象に紐付けて構成した(出典の網羅性・恣意性は §6.1 で議論する)。

ローダー(`event_loader.py`)健康診断の結果:

- 読み込み成功 156件 / パースエラー 0件
- **領域別:** プラットフォーム26、メディア技術25、生活文化19、経済雇用17、教育制度13、金融資産13、政治制度12、物価価格11、公衆衛生7、災害危機7、国際環境6
- **モード別:** PASSIVE 63、REFRAME 50、ACTIVE 43
- 作用ベクトル欠損 0件 / 個別感受性ピーク付与 156件(フォールバック0件)/ 未知領域 0件

**ラベル–ベクトル整合監査.** 領域ラベルはいかなる計算にも入力されない記述タグだが(§3.4 設計ノート)、表示上の正確さのため、ラベルが作用ベクトルの実態と整合するかを監査した。監査の結果、「Windows95発売」と「ライブ配信・投げ銭文化」の2件で、ラベルとベクトルの語彙が矛盾していた。前者の作用ベクトル `{internet_literacy, work_tooling, media_literacy, search_behavior}` は遊び・視覚表現・娯楽というメディア技術の語彙ではなく情報接続・道具・リテラシーというプラットフォームの語彙であり、後者 `{creator_economy, self_presentation, consumption_norm, peer_culture}` も視聴娯楽ではなく参加・収益化の語彙であった。いずれもベクトルを演繹的根拠としてラベルをプラットフォームへ是正した(結果を狙った操作ではなく、記述の整合化である)。なお本モデルの干渉スコアは領域に依存しないため(§3.5)、この是正は一切の定量結果に影響しない。PlayStation × Windows95 が干渉上位に出るのは、両者の作用ベクトルが直交する($\cos=0$)からであって、領域ラベルが異なるからではない(§5.1)。

### 4.2 ハイブリッド設計と頑健性

エンジンは v4(計算コア)を一切書き換えず、v5 がデータと個別感受性カーブを差し替える構成(`patched_mode_weight`)を採る。これにより v4 段階の検証結果を破壊せずにデータ規模を拡張できる。ローダーは未知の領域名・型ゆれ・キー欠損があっても1行スキップで継続し、`effective_year` を作用年として優先吸収する。

## 5. Results

### 5.1 代表世代の3軸プロファイル(1981・1995・2000年生まれ)

最初に、3つの代表世代の3軸プロファイルを詳細に示す。1981年(ミレニアル中核)、1995年・2000年(いわゆるZ世代)を取り上げ、世代指紋・干渉の質感がどう質的に変わるかを見る。

代表例として1981年生まれを分析する(本人による定性検証あり、§5.4)。世代指紋は **PASSIVE 0.81 / ACTIVE 0.56 / REFRAME 0.55**(平均重み)であり、PASSIVE が支配的である(Table 2)。

**Table 2. 1981年生まれの世代指紋**

| モード | 件数 | 平均重み | 上位3件平均 |
|---|---|---|---|
| PASSIVE(刷り込みの濃さ) | 63 | 0.81 | 1.00 |
| ACTIVE(人生分岐の重さ) | 42 | 0.56 | 0.77 |
| REFRAME(基準ずらしの幅) | 50 | 0.55 | 0.77 |

**軸1 PASSIVE(身体に刷り込まれたもの).** 重み上位は Windows95(15歳, 1.00)、2ちゃんねる(20歳, 1.00)、阪神淡路大震災(14歳, 1.00)、地下鉄サリン事件(14歳, 1.00)、プリクラ普及(15歳, 1.00)、TSUTAYA・CDレンタル文化(14歳, 1.00)、携帯電話普及(19歳, 1.00)、9.11同時多発テロ(20歳, 0.99)。人格形成期(12–17歳)に技術・災害・生活文化が密に着弾している。

**軸2 ACTIVE(意思決定を迫ったもの).** ふるさと納税(34歳, 0.81)、派遣労働規制緩和(23歳, 0.75)、保育園待機児童問題(32歳, 0.75)、検索エンジン普及(24歳, 0.73)など、成人初期〜社会実装期に分散する。

**軸3 REFRAME(「普通」の基準をずらしたもの).** 発火上位は、家族形成参照点(晩婚化定着34歳 → 少子化国家課題化42歳, $\delta=0.80$, fire=0.47)、個人データ制度(個人情報保護法施行24歳 → 顔認証普及39歳, $\delta=1.00$, fire=0.44)、消費税参照点(5%@16歳 → 8%@33歳, fire=0.37)、低金利参照点(ゼロ金利@18歳 → マイナス金利@35歳, fire=0.36)。

**干渉ノード(世代の質感).** 上位は、同一バンドに近接着弾しながら作用が直交する($\cos\approx0$)ペアが占める:Windows95 × プリクラ(15歳, 情報接続×自己提示, score=1.60)、阪神淡路 × TSUTAYA・CDレンタル(14歳, 安全観×消費娯楽, score=1.60)、地下鉄サリン × TSUTAYA・CDレンタル(14歳, score=1.60)、**PlayStation × Windows95(15歳, 映像表現×情報接続, score=1.59)**、iモード開始 × 9.11(20歳, 携帯接続×世界観ショック, score=1.58)。これらが上位に来るのは事象が異なる**領域ラベル**を持つからではなく、作用ベクトルが直交している(共有する作用次元を持たない)からである。**「安全神話の崩壊と、掘って楽しむ消費文化が同じ14歳に同時着弾し、その翌年(15歳)には映像表現(PlayStation)と情報接続・コンピューティング(Windows95)が同時に身体化された」**という質感が、この世代の指紋として抽出される。前者(14歳)が世界観の不安定化、後者(15歳)が技術環境の二重着弾という、人格形成期の二段構えが見える。

**1995年・2000年生まれ(Z世代):3軸の均衡化.** 同じエンジンで1995・2000年生まれを分析すると、1981とは質的に異なる指紋が出る(Table 2b)。第一に、**PASSIVE の優位が崩れ3軸が接近する**:1981の (0.81, 0.56, 0.55) に対し、1995は (0.71, 0.61, 0.62)、2000は (0.72, 0.62, 0.63)。刷り込みの相対的支配が薄れ、意思決定強制(ACTIVE)と基準書き換え(REFRAME)が肉薄する。第二に、両世代とも**わずかに REFRAME ≳ ACTIVE** であり、若い世代ほど「書き換えられた基準値の世界」を生きる構造が出る。

**Table 2b. 代表3世代の世代指紋(平均作用重み)**

| 生年 | PASSIVE | ACTIVE | REFRAME | 支配構造 |
|---|---|---|---|---|
| 1981 | **0.81** | 0.56 | 0.55 | PASSIVE 突出 |
| 1995 | 0.71 | 0.61 | 0.62 | 3軸均衡(REFRAME ≳ ACTIVE) |
| 2000 | 0.72 | 0.62 | 0.63 | 3軸均衡(REFRAME ≳ ACTIVE) |

軸の中身も世代を語る。**ACTIVE** は1981では成人後に分散していたが、1995・2000では新NISA・暗号資産・副業・インボイス・MeToo・奨学金返済など、**金融判断と労働・規範の意思決定が成人初期(20代前半)に密集**する。**REFRAME** は1981の「消費税5→8%」「ゼロ金利→マイナス金利」に対し、1995・2000では「ドル円70→150円」「個人情報保護法→顔認証」が上位に来る——同じ参照点書き換えでも、為替と個人データ監視という別の物差しが身体化される。

**干渉ノードの質感**が最も鮮明に世代を分ける。1981が「安全神話の崩壊 × 消費娯楽」を**人格形成期(14–15歳)**に食らったのに対し、2000年生まれの干渉上位は **TikTok × コロナ禍 / TikTok × Uber Eats / Uber Eats × マスク不足**——いずれも **社会接続期(20歳)に同時着弾**する。すなわち「**プラットフォーム前提とパンデミックが、社会へ接続するまさにその年齢に重なって着弾した**」という質感が、2000年世代の指紋として抽出される。1995年生まれはその過渡で、「尖閣 × ソーシャルゲーム(17歳)」「QRコード決済 × スマートスピーカー(24歳)」のように、地政学緊張とプラットフォーム日常化が並走する。これらは出生年ラベル「Z世代」では一様に潰れる差を、着弾年齢×作用モードで解像している。

### 5.2 9世代バッチ:PASSIVE 密度の非単調構造

1970–2010年生まれを5年刻みで分析した(Table 3)。すべての世代で支配モードは PASSIVE だが、その**密度は単調ではない**。

|---|---|---|---|
| 1970 | 0.57 (63) | 0.42 (43) | 0.46 (50) |
| 1975 | 0.71 (63) | 0.49 (43) | 0.51 (50) |
| 1980 | **0.80** (63) | 0.55 (42) | 0.55 (50) |
| 1985 | **0.80** (63) | 0.58 (42) | 0.58 (50) |
| 1990 | 0.76 (60) | 0.60 (42) | 0.60 (48) |

| 2005 | 0.76 (39) | 0.61 (38) | 0.59 (45) |
| 2010 | 0.75 (33) | 0.52 (34) | 0.54 (44) |

主たる知見は二つ。第一に、**PASSIVE 密度は1980–85年生まれでピーク(0.80)を取り、以降減衰する**。これは、ファミコン以降のメディア環境の爆発的拡張(Windows95・PlayStation・iモード・ケータイ)が、ちょうど1980–85年生まれの人格形成期〜社会接続期に集中着弾したことの帰結である。出生年コホート論では「ミレニアル世代」として一括りにされる範囲の内部に、明確なピーク構造が存在する。

第二に、**ACTIVE と REFRAME は出生年が下るにつれ緩やかに上昇**し(ACTIVE 0.42→0.62、REFRAME 0.46→0.63)、2000年前後で PASSIVE に接近する。若い世代ほど、刷り込みの相対的優位が薄れ、意思決定強制と基準書き換えの比重が増す。これは「Z世代は受動的なデジタルネイティブ」という通俗像と逆向きの構造である。

各世代の人格形成期(12–17歳)原体験 Top も質的な転換を示す:1980「スーパーファミコン/阪神淡路/地下鉄サリン」→1985「音楽CDバブル/DVD/9.11」→1995「薄型テレビ/尖閣/ソーシャルゲーム」→2005「マスク不足/K-pop第3・4世代/PS5抽選」。同じ「人格形成期の原体験」という窓から、まったく異なる事象群が抽出される。

### 5.3 文化層:構造プロファイルからの仮説生成と選択肢空間の断絶

構造層が出力する3軸プロファイルと人格形成期の原体験を**条件**として、大規模言語モデル(OpenAI GPT系)に「その世代が思春期〜20代に実際に選択肢として持っていた文化的嗜好空間」を4軸(音楽/スポーツ/文学/映画)で生成させた(`generate_picks.py`、9世代分をキャッシュ)。**重要な限定として、これは実証データではなく、構造プロファイルから可能な文化分岐を引き出す仮説生成器である(§6.2)。**

音楽軸の選択肢空間を時系列で並べると、出生年に沿った連続的変化の中に、**選択肢空間そのものの質的断絶**が観測される。

- **1985→1990年生まれの断絶(「掘る文化」→「流される文化」).** 1985年生まれの選択肢空間は「青春パンク/メロコア」「ヴィジュアル系」「ヒップホップ/ミクスチャー」など、能動的に系統を選んで掘る分岐が並ぶ。一方1990年生まれでは「ニコ動・ボカロ・歌い手文化」「アニソン/声優アーティスト」「K-POP」が前景化し、プラットフォームに媒介された流通が選択の前提になる。
- **1995→2000年生まれの断絶(「アイドル前提」→「TikTok前提」).** 1995年生まれは「握手会・総選挙文化」「サブスク時代の令和J-POP」が併存する過渡期だが、2000年生まれでは「TikTok・ショート動画発のバズ曲」が独立した軸として立ち上がり、選択の起点がプラットフォームのアルゴリズムに移る。

この断絶は、§5.2 で見た PASSIVE 密度の減衰(1985以降)および ACTIVE/REFRAME の上昇と整合する。すなわち、**身体への一方向的刷り込み(PASSIVE)が薄れ、プラットフォーム上での選択・分岐(ACTIVE)が前景化する**という構造層の変化が、文化層の選択肢空間の様相変化として現れている。

### 5.4 定性検証

1981年生まれの本人(著者の一人)に対し、構造プロファイルから生成したペルソナ記述(10項目)を提示したところ、**10項目中9項目が本人の自己認識と一致**した。これは n=1 の予備的検証にすぎず、§6 で述べる通り体系的な実証は Paper 2 に委ねる。しかし、ルールを先に固定したモデルが、較正に使っていない個体の自己像と高い一致を示した点は、設計の妥当性を支持する弱い証拠である。

## 6. Discussion

### 6.1 何が新しいか

本モデルの新規性は四点に集約される。第一に、**REFRAME(参照点書き換え、差分発火)** という作用モードである。これは既存の世代論に存在しない。世代の差は「何を経験したか」だけでなく「何を基準値として身体化し、後の事象をその基準で測っているか」によっても生じる。ドル円70円台を知る身体だけが140円台で「やばい」を起動するという非対称は、出生年では捉えられない。

第二に、**作用ベクトルのコサイン類似度による被り判定**による二重計上の回避である。世代論はしばしば事象を列挙して「これだけ多くを経験した世代」と語るが、作用が被っていれば件数は水増しである。本モデルは作用空間での非類似性を機械判定する。

第三に、**干渉を世代依存にした**ことである。同じ事象ペアでも、それが同一の認知段階バンドに同時着弾したかで質感が変わる。これにより「世代の質感」が出生年の関数として連続的に立ち現れる。

第四に、**イベントの単一カテゴリ化を排した「ベクトルネイティブ」設計**である(§3.4 設計ノート、§3.5)。本稿は世代を出生年カテゴリに潰すなと主張するが、その論理をイベント側にも自己適用し、事象を単一の領域に潰すことも拒む。この純化は単なる美学ではなく**実測で検証した**。領域ラベルに依存していた旧版(干渉に「領域横断1.6倍」を用いる)と、領域を完全に廃して作用直交性 $D=1.6-1.05\cos$ のみで干渉を測る純化版を比較したところ:(i) 1981年生まれの3軸指紋(0.81 / 0.56 / 0.55)は**完全に不変**、(ii) 9世代バッチの密度(Table 3、PASSIVE 1980–85ピークを含む)も**完全に不変**、(iii) 1981年の干渉ノード上位10件中9件が順位・絶対スコアまで一致、(iv) 9世代の質感筆頭(干渉Top1)は9件中8件が一致した。すなわち**領域ラベルはモデルの結論に何も寄与していなかった**——3軸指紋とバッチ密度はそもそも領域に一切依存せず(`mode_weight` はモード・主体性・サリエンス・感受性のみの関数)、干渉層でのみ領域が粗い代理として働いていたが、その役割は作用ベクトルのコサインが連続かつより忠実に担える。差分が生じた唯一の質感ノード(1985年:旧「阪神淡路×ジブリ」→ 新「Twitter×Amazon」)は、**同一領域(ともにプラットフォーム)だが作用が直交するペアを、カテゴリラベルが不当に抑圧していた**事例であり、純化版の方が「異なる作用の同時着弾」をより正しく拾っている。この検証により、五輪が「公衆衛生か国際環境か政治制度か」といった分類論争は、答える必要のない疑似問題として消滅する。

### 6.2 文化層の位置づけ:仮説生成器であって実証ではない

§5.3 の文化層(pickリスト生成、文化サブクラスタ生成)は、**仮説生成器(hypothesis generator)** である。LLM が構造プロファイルを条件に「ありうる文化分岐」を出力するが、これは生成された仮説であって、実在する分布の測定ではない。LLM は学習データ由来のバイアスを持ち、固有名詞の選定や系統の切り方には恣意が入りうる。LLM を人間集団の代理標本として用いる「シリコンサンプリング」は近年盛んに検討されているが (Argyle et al., 2023; Park et al., 2023)、その出力が実在分布をどこまで忠実に再現するかは未解決の問いであり、本稿はあくまで仮説生成にとどめ測定とは主張しない。

それでもこの層を含める理由は、構造層(計算)が出力する抽象的な3軸が、具体的な文化的仮説へと**翻訳可能**であることを示すためである。構造層の「PASSIVE 減衰・ACTIVE 上昇」という変化が、文化層の「掘る文化→流される文化」という人間が読める仮説に対応した(§5.3)ことは、構造と文化のあいだに橋が架かることを示唆する。この橋が実在の分布を捉えているかは、次節の実証で検証されるべき問いである。

### 6.3 反証可能性

本モデルは原理的に反証可能である。ルール(感受性カーブ、3モード式、発火式、独立性閾値)は個別世代の記述に先立って固定されており、そこから任意の出生年のプロファイルが**演繹**される。したがって以下が検証手続きとなる:

1. ある出生年について生成したプロファイル/ペルソナと、当該出生年の実在個体の自己報告との一致率を測る。
2. モデルが予測する「断絶の境界」(例:1985/1990、1995/2000)が、独立に測定した文化指標・価値観指標の不連続と一致するかを検定する。
3. 干渉ノードが予測する「世代の質感」が、当該バンドに着弾した個体に特異的に観測されるか(他バンド個体には観測されないか)を対照する。

これらは Strauss-Howe 型の事後ナラティブには不可能な検定である。

### 6.4 次の課題(Paper 2 以降)

本稿は構造層と仮説生成器に射程を限った。以下を次段階に置く。

- **Prolific による実証:** §6.3 の手続きを、Prolific 等のパネルで実データを取得して実行する。プロファイル一致率・断絶境界・干渉特異性の三点を主たる検証対象とする。
- **3C フレームワークへの拡張:** 本稿の作用モデルを Culture / Community / Code の3領域に拡張する。**ここで Code はプログラミング技能ではなく、共同体における「許可・禁止・黙認・推奨」の規範コード(normative code)を指す。** たとえば、高卒就職・地元結婚・離婚・同性婚・移民・起業・大学進学などが、各共同体でどの程度「許される／禁じられる／推奨される／黙認される」かが、同一事象の作用モードを変換する。言い換えれば、**ある共同体で「禁止されていないことのリスト」が、その共同体に属する個人の人生設計の可能空間を規定する。** Code への適用は、感受性カーブと REFRAME の枠組みが規範的社会現象の世代依存にも一般化するかの試金石となる。
- **海外版・国際比較:** 現データベースは日本に限る。同一のルールで各国の事象データベースを構成すれば、ルール不変・データ可変の設計のもとで国際比較が可能になる。事象は国ごとに異なるが、感受性カーブと作用モードの枠組みは普遍であるという仮説を検証する。
- **Contextual Mode Resolver:** 本稿では構造層を明確にするため、各事象の作用モードを事象属性として扱った。しかし国際比較・地域比較においては、**同一事象であっても宗教・階層・地域規範・地政学的位置によって PASSIVE / ACTIVE / REFRAME が変換される可能性**がある。同性婚合法化、移民政策、9.11、金融危機、パンデミック規制などはその典型である(§2.5)。Paper 2 では、`Event.mode` を固定値ではなく、**Event × Community × Code から解決される `ResolvedImpact`** として扱う。これが海外版 SCEM の本丸である。
- **データベースの拡充と出典監査:** 156件の事象選定の網羅性・代表性を体系的に監査し、選定バイアスを定量化する。

### 6.5 限界(Limitations)

第一に、**臨界期類推の身分**。本稿の感受性カーブは、神経科学の臨界期 (Hensch, 2005; Knudsen, 2004) を社会事象の作用へとマクロに類推したものであり、両者のあいだに機序的な同型性を主張するものではない。カーブはあくまで「年齢依存の作用強度」を表す操作的構成物であり、神経可塑性そのものの測定ではない。第二に、**事象選定のバイアス**。156件は LLM 一次リサーチに基づき、何を「社会事象」とみなすか自体に選定者の視点が入る。第三に、**パラメータの較正**。感受性カーブのピーク・幅・床値、被り判定の閾値(0.82/0.70/0.35)、作用直交性項の係数($D=1.6-1.05\cos$)などは理論的目安に基づく初期値であり、データ駆動の較正はまだ行っていない。第四に、**REFRAME 孤児**。データベース上の50件の REFRAME 事象のうち多くは `reframe_group` 内の相方を欠き(孤児)、現状で実際に発火するのは複数メンバを持つ少数グループに限られる。発火事例の網羅性は今後のデータ拡充に依存する。第五に、**実証の欠如**。定性検証は n=1 にとどまる(§5.4)。

これらの限界は本モデルを Mannheim / Strauss-Howe と同じ「未実証」の土俵に置く。しかし §6.3 で述べた通り、本モデルはその土俵の上で**検証可能な設計**を持つ点で異なる。

---

## 7. Conclusion

「Z世代は〜だ」という語りは、恣意的なカットオフ・反証不能性・出生年への単一還元という三つの欠陥を抱えている。本稿はこれらを同時に解消する計算可能なモデル **Situated Cohort Exposure Model(SCEM)** を提案した。世代を出生年コホートではなく、**社会事象の作用ベクトルが認知発達上の感受性窓にどう着弾したかで決まる連続プロファイル**として再定義し、(1) 3作用モード(PASSIVE/ACTIVE/REFRAME)、(2) 個別ピーク優先の非対称感受性カーブ、(3) 後続差分で発火する REFRAME 式、(4) コサインによる被り判定(領域非依存)、(5) 作用直交性で重み付ける干渉ノード、として操作化した。SCEM は集団の曝露構造を対象とし、個人層・個人ラグ・地域波及ダイナミクスを意図的に射程外に置くことで、説明範囲を事前宣言した反証可能なモデルとなる(§2.4)。

出典付き156件のデータベースを入力に、1981年生まれの3軸指紋(PASSIVE 0.81 / ACTIVE 0.56 / REFRAME 0.55)、9世代バッチにおける PASSIVE 密度の1980–85ピークと非単調構造、そして文化選択肢空間における1985/1990・1995/2000境界の断絶を示した。文化層は仮説生成器として位置づけ、その実証は Paper 2 に委ねる。

Mannheim は世代が経験の共有で決まることを見抜いたが計算できなかった。本稿はそれを計算可能にする。ルールを先に固定し、そこから各世代を演繹するこの設計は、世代論を初めて反証可能な対象にする。

個別感受性ピークを持たない事象に用いる33本(11領域×3モード)のカーブのピーク年齢 $\mu$ は、各領域の作用が最も刺さる発達段階に較正されている(抜粋):メディア技術 PASSIVE $\mu=14$、教育制度 ACTIVE $\mu=16$、経済雇用 ACTIVE $\mu=22$(就活・初職)、災害 REFRAME $\mu=16$($\sigma_R=24$ で成人後も長く残す)、政治 ACTIVE $\mu=18$(主体になる年齢)、金融資産 REFRAME $\mu=32$、物価 REFRAME $\mu=28$。完全な係数表は実装(`media_generation_v4.py`, `CURVES`)を参照。本研究データベースでは全件に個別ピークが付与されており、フォールバックは発生しない。

## Appendix D. Community 層の作用例:同一構造プロファイルからの分岐ペルソナ(マーケティング応用)

> 本付録は、SCEM の Community 層が生成する作用事例を**マーケティング応用の観点から例示**するものであり、**統計的実証ではない**。Community 層の体系的検証は Paper 2 に委ねる。

**位置づけ(重要).** 本付録は、SCEM の Community 層(§2.4)が**何を出力するか**を示す**マーケティング応用の例示**である。構造層(§3)が Python による数理計算であるのに対し、本付録は **LLM による解釈レイヤー**であり、社会学的な母集団推定ではなく、セグメント仮説の生成器(§6.2 の Culture 層と同じ位置づけ)として提示する。したがって**標本数は論点にならない**——ここで示すのは「閉鎖度と伝播速度を変えると Community 層がどのような分岐ペルソナを生成するか」という**機構の出力形**であって、実在する人口の分布の推定ではない。実証(分布の測定)は Paper 2 に委ねる。

**設定.** 構造プロファイルを **1981年生まれ**に固定し、嗜好を **「横乗り系(スケート/スノボ・PUNK/ミクスチャー)× 洋楽ロック」** に固定する。この上で Community 層の2パラメータ——**閉鎖度**(開放／中間／閉鎖の離散アーキタイプ)と **伝播速度**(`effective_year` を地域でずらす連続オフセット)——を動かし、LLM にペルソナを生成させた(`community_experiment.py`)。同一の構造指紋・同一の嗜好でも、Community 層が異なれば「実際に具現化した自己」が分岐する。対極の2セルを抜粋する。

**Table D. 同一構造プロファイル(1981・横乗り×洋楽ロック)からの分岐ペルソナ**

| 次元 | 速・開放(都市・即時) | 遅・閉鎖(地方・遅延) |
|---|---|---|
| 自己像 | Windows95直撃の都市型スケートパンク／ミクスチャー自己 | 閉鎖地元圏で洋楽ロックへの憧れをレンタルCDと冬のスノボに圧縮した、内向き横乗り志向の定番適応型 |
| 音楽の実践 | The Offspring/Green Day系メロコア、RATM/Beastie Boys系ミクスチャーを**シーンで**摂取 | 同じ洋楽ロックを **TSUTAYAのレンタル・友人のMD・雑誌**で後追い摂取 |
| 横乗りの実践 | 都市の公園・ショップ・スケートスポットで実践、スノボもブランドごと自己表現化 | スケートは近所の目で続かず、**冬のスノボ旅行**に圧縮、VANS等の**服装記号**として部分摂取 |
| 自己提示 | 「群れすぎないがシーンにはいる」都市的洗練 | 「ロックが好き／少し外を知っている」程度に**地元で浮かない**よう抑制 |
| 共同体との関係 | 地元と都市サブカルを繋ぐ**ハブ**的距離 | 同級生・先輩後輩・職場の人間関係が優先、逸脱は目立たぬ範囲に調整 |
| 嗜好の具現化 | 速い伝播+開放でほぼ**原形のまま現場参加** | 反抗性は生活様式にならず、**服装・選曲・車内BGM・記憶**として保存 |

**マーケティング上の含意.** 出生年(1981)も明示的嗜好(横乗り×洋楽ロック)も同一の2人が、Community 層の違いだけで**別のセグメント**になる——消費接点(現場/レンタル)、自己提示、ブランドとの距離が体系的に異なる。出生年×嗜好でターゲティングする従来手法はこの2人を同一セグメントに潰すが、SCEM の Community 層は両者を分離した仮説として生成する。なお**この事例で生成された出力**では、閉鎖度が同じペルソナは伝播速度が違っても近い自己像が生成され、伝播速度が同じでも閉鎖度が違えば異なる自己像が生成される、という形で出力された(閉鎖度=離散的な分岐軸、速度=連続的な変調、という見立て)。これはこの生成例の出力特性を事例として記述したものであって、検証された一般的事実ではない——体系的な検証は Paper 2 に委ねる。
