<script id="md" type="text/markdown"># 文脈依存モード問題と Contextual Mode Resolver:同一の社会事象はなぜ共同体ごとに別の世代経験になるのか

**The Contextual Mode Resolver: How the Same Social Event Becomes a Different Generational Experience Across Communities (A Cross-National Extension of SCEM)**

Masamichi Iizumi¹*, Tamaki Iizumi¹

¹ Miosync, Inc. — Independent Research
\* Corresponding author: m.iizumi@miosync.email

**Preprint version 0.9 (working draft) — 2026-06-25**
*Companion to Paper 1「年齢同期型メディア世代論(SCEM)」(SocArXiv). This draft establishes the Contextual Mode Resolver and reports designed cross-national comparison grids (US/UK). Prolific empirical validation remains future work.*

---

## Abstract

Paper 1 で提示した Situated Cohort Exposure Model(SCEM)は、各社会事象に **PASSIVE(受動着弾)/ ACTIVE(能動分岐)/ REFRAME(参照点書き換え)** という単一の作用モードを与えていた。しかし作用モードは事象に固有ではない。**同じ「Brexit」が、ロンドンの移民二世中産層には所属基準の書き換え(REFRAME)として、Leave タウンの労働者層には投票による意思表示(ACTIVE)として着弾する。** 本稿はこの **文脈依存モード問題(The Contextual Mode Problem)** を正面から扱い、`Event.mode` を固定値から **`Event × Premise Layer → ResolvedImpact`** へと持ち上げる作用素 **Contextual Mode Resolver(CMR)** を定式化・実装する。

CMR は二つの独立な LLM 観測者(本研究では ChatGPT と Gemini)に、固定された共同体前提(premise)の集合の上で各事象の作用モードを判定させ、両者を統合する。観測者間の不一致それ自体を消すのではなく **観測者依存性(observer-dependence)として測定対象に組み込む**。我々はさらに、生成された世代プロファイルが捏造でないことを保証するために **4 つの公理(Honest Structuralism)** ── アンカー保存・非上書き・射影整合・由来追跡可能性 ── を課し、ペルソナ生成を **制約充足問題(CSP)/ SAT・UNSAT** として扱う LOD ペルソナ生成器を実装した。

実証として、米国(8 共同体 × 12 事象 = 96 セル)と英国(9 共同体 × 13 事象 = 117 セル)の **設計された完全比較グリッド** を構築した。固定 premise の上では、**選定した高争点事象において Event レベルの Mode Flip Rate は両国とも 100%**(全事象が少なくとも一つの共同体間でモード分岐する)であり、セルレベルでは US 75% / UK 63%、二観測者間のモード不一致は US 49 / UK 48 件であった。共同体間の指紋距離(Contextual Divergence Index)は US 0.289 / UK 0.338。最後に、**同一の出生年(1985)・同一の自己記述入力**を与えても、premise を変えるだけで LOD ペルソナの由来構造(provenance)が体系的に分岐することを示す(Bible Belt は 9.11 を ACTIVE 分岐として引き受け、Coastal Liberal は REFRAME を基層に置く)。

**Keywords:** generations, contextual mode resolver, observer-dependence, situated cohort exposure model (SCEM), constraint satisfaction, LLM-as-annotator, honest structuralism, cross-national comparison, Brexit, computational sociology

---

## Abstract (English)

In Paper 1, the Situated Cohort Exposure Model (SCEM) assigned each social event a single mode of impact — PASSIVE (passive imprinting), ACTIVE (forced decision), or REFRAME (reference-point rewriting). But the mode is not intrinsic to the event. **The same "Brexit" lands as a rewriting of belonging (REFRAME) for second-generation immigrant middle-class Londoners, yet as an act of self-expression through voting (ACTIVE) for working-class voters in a Leave town.** This paper confronts this **Contextual Mode Problem** and lifts `Event.mode` from a fixed value to an operator, the **Contextual Mode Resolver (CMR)**: `Event × Premise Layer → ResolvedImpact`.

CMR has two independent LLM observers (here, ChatGPT and Gemini) resolve the mode of each event over a fixed set of community premises, and merges them — not by erasing inter-observer disagreement but by **treating observer-dependence as a measured quantity.** To guarantee that the generated cohort profiles are not fabricated, we impose **four axioms (Honest Structuralism)** — anchor preservation, non-overwrite, projection consistency, and provenance traceability — and implement an LOD persona generator that frames persona synthesis as a **constraint-satisfaction problem (SAT/UNSAT).**

Empirically, we construct **designed full comparison grids** for the US (8 communities × 12 events = 96 cells) and UK (9 × 13 = 117). On fixed premises, the **Event-level Mode Flip Rate is 100% in both countries for the selected high-contention events** (every event flips mode across at least one pair of communities); the Cell-level rate is 75% (US) / 63% (UK), and inter-observer mode disagreements number 49 (US) / 48 (UK). The Contextual Divergence Index across communities is 0.289 (US) / 0.338 (UK). Finally, holding birth year (1985) and self-report inputs constant, varying only the premise systematically diverges the provenance of generated LOD personas (the Bible Belt takes 9/11 as an ACTIVE branch, while Coastal Liberal keeps REFRAME as its base).

## 1. Introduction

### 1.1 Paper 1 が残した問い

Paper 1 は「世代とは出生年コホートではなく、社会事象の作用ベクトルが感受性窓にどう着弾したかで決まる連続プロファイルである」と主張し、各事象に 3 作用モード(PASSIVE / ACTIVE / REFRAME)を割り当てて世代指紋を計算した。だが Paper 1 §2.5 で予告したとおり、この設計には未解決の前提が一つ残っていた ── **作用モードは事象に固有か?** という問いである。

答えは否だ。2015 年の同性婚合法化は、Coastal Liberal には「自分たちの規範が国の規範になった」確認(REFRAME)であり、Bible Belt Evangelical には「自分の立場を表明せねばならない」圧力(ACTIVE)である。同じ Brexit が、ロンドン移民二世には開放的英国という所属基準の崩壊(REFRAME)、Leave タウン労働者には「声を取り戻す」投票行動(ACTIVE)になる。**事象は同じでも、それがどの作用モードに変換されるかは、受け手の共同体が持つ規範コード(Code)・所属(Community)に依存する。**

### 1.2 本稿の貢献

本稿は次の三点を行う。

1. **Contextual Mode Resolver(CMR)の定式化**:`Event.mode` を固定値から `Event × Premise Layer → ResolvedImpact` という作用素へ持ち上げる(§3.1)。
2. **観測者依存性の測定化**:二つの独立な LLM 観測者(ChatGPT / Gemini)に同一 premise 集合上でモードを判定させ、両者の不一致を消去せず **observer-dependence として測る**(§3.2, §5.1)。
3. **Honest Structuralism による生成保証**:4 公理と CSP/SAT-UNSAT 枠組みにより、生成された世代プロファイル・ペルソナが LOD0(数理アンカー)に由来追跡可能であることを保証する(§3.3, §3.4)。

そのうえで、米英の **設計された完全比較グリッド**(US 96 セル / UK 117 セル)で CMR を走らせ、モード分岐率・観測者不一致・共同体間発散・同年生まれペルソナの分岐を報告する(§5)。

### 1.3 なぜ海外版か

文脈依存モード問題は、規範コードが共同体ごとに鋭く異なる社会でこそ可視化される。米国(宗教 × 人種 × 地域 × 学歴)と英国(階級 × 地域 × 移民世代 × EU 距離)は、**同一事象が共同体ごとに別モードへ変換される度合いが大きい自然実験場**である。日本単独では Community 軸の分散が小さく、CMR の効果が見えにくい。海外版は SCEM の Community 層を実証的に駆動する本丸である。

## 2. Conceptual Framework

### 2.1 3 作用モードの再掲

SCEM の作用モードは以下の三つ(Paper 1 §3.1)。本稿でも定義は不変である。

- **PASSIVE(受動着弾)**:本人の選択を介さず、環境として刷り込まれる曝露。
- **ACTIVE(能動分岐)**:本人に立場選択・意思決定を迫る事象。
- **REFRAME(参照点書き換え)**:「当たり前」の基準値そのものを書き換える事象。

これら 3 軸は **決して合算しない**(Paper 1 の設計原則)。世代指紋は (PASSIVE, ACTIVE, REFRAME) の三つ組として保持される。

### 2.2 文脈依存モード問題(The Contextual Mode Problem)

Paper 1 では各事象に単一モードを固定していた。本稿の出発点は、**そのモードが受け手の前提層(premise)に依存して変わる**という観察である。形式的には:

> 事象 $e$ の作用モードは、$e$ の属性だけでは決まらず、受け手の共同体前提 $\pi$ との対 $(e, \pi)$ によって解決(resolve)される。

これを **Contextual Mode Problem** と呼ぶ。premise $\pi$ は本研究では「規範コード・所属・地域・学歴」を結合した正準文字列(canonical premise)として与える(§4.2)。

### 2.3 観測者依存性(Observer-dependence)

$(e, \pi)$ から作用モードを解決するのは、本研究では大規模言語モデルである。ここで重要なのは、**異なる LLM 観測者は同じ $(e, \pi)$ を異なるモードに解決しうる**という事実だ。我々はこれをノイズとして平均消去するのではなく、構造的な情報として扱う:

- **ChatGPT** は「何が起きたか(what happened)」を相対的に客観記述する LOD0 寄りの観測者として振る舞う傾向がある。
- **Gemini** は「それが社会的に何を意味したか(what it socially meant)」を解釈する LOD1 寄りの観測者として振る舞う傾向がある。

両者のモード不一致は、事象が「出来事」と「意味」のどちらの相で受け止められたかの指標になる。**観測者依存性は、消すべきバイアスではなく、測るべき量である**(§5.1 で 49/48 件として定量化)。

> **データ収集上の決定(2026-06-25)**:ここで Gemini の **内容と梱包を区別**する。Gemini の*判定内容*(rationale)は良質で、「社会的に何を意味したか」を捉える LOD1 寄り観測者として十分機能している(§5.2 の Brexit rationale 群がその例。cross-model 不一致 49/48 件=グリッドの測定可能性は ChatGPT × Gemini から生じている)。問題は*梱包*、すなわち出力のシリアライズ破損(復旧のたびに先頭共同体を 1 つ失う、§7.1)である。したがって方針は **Gemini の置換・破棄ではなく、複数観測者(multi-observer)化**:Gemini の回収済み内容は保持し、破損で欠けた箇所のみ Claude で補い、可能な箇所は **ChatGPT × Gemini × Claude** の追加観測者として扱う。

### 2.4 Honest Structuralism — 4 公理

LLM に世代プロファイルやペルソナを生成させる以上、「もっともらしいが数理アンカーに由来しない作り話」を排除する仕組みが要る。我々は次の 4 公理を課す。

1. **Anchor Preservation(アンカー保存)**:成人後に出会った事象を人格形成アンカーにできない(時間アンカー違反の禁止)。
2. **Non-overwrite(非上書き)**:LOD0(曝露構造)が確定した事実を、上位 LOD(解釈・物語)が書き換えてはならない。
3. **Projection Consistency(射影整合)**:生成された解釈は、核となる LOD0 事象に一定割合以上、由来追跡可能でなければならない(閾値 70%)。
4. **Provenance Traceability(由来追跡可能性)**:各解釈は「どの LOD0 事象から導かれたか」を明示せねばならない。

これらの公理は、CMR の出力(§3.4 のペルソナ)を SAT(整合)/ UNSAT(矛盾)として判定可能にする。

## 3. Model and Methods

### 3.1 Contextual Mode Resolver(作用素としてのモード)

CMR は次の写像である:

$$\text{CMR}: (e, \pi) \mapsto \text{ResolvedImpact}(e, \pi) = (\text{mode}, \text{rationale}, \text{effect\_emphasis}, \text{source\_model})$$

ここで mode ∈ {PASSIVE, ACTIVE, REFRAME}、rationale はその共同体での着弾理由(LLM の自然言語出力)、effect_emphasis は作用ベクトルのどの成分が強調されたか、source_model は観測者の識別子である。

複数観測者からの解決の統合は、三つの状態を区別する:

- **`resolved_agree`**:二観測者が同一モードに解決(確定)。
- **`resolved_disagree`**:不一致。**真の解決として単一値に潰さず、モード分布(複合モード)として保持する**(これが observer-dependence の測定対象である)。
- **`operational_resolved_mode`**:図示・指紋計算のために、不一致セルへ暫定的に与える単一値。**多数決 + tie-break(ACTIVE > REFRAME > PASSIVE)で計算するが、これは「真の解決」ではなく計算用の運用ヒューリスティック**である。優先順位は「決断強制を見落とさない」保守的選択であって、ACTIVE が規範的に上位という主張ではない。指紋・MFR・CDI はこの運用値の上で計算される(よって tie-break 規則の変更に対する感度は将来の感度分析に委ねる)。

**欠損の扱い:** 該当する解釈が無いセルは **missing(NA)** として扱い、補完しない(Honest Structuralism の Non-overwrite)。本稿の完全グリッドは欠損ゼロが売りであり、欠損を背景的 PASSIVE で埋めることはしない。`ambient PASSIVE`(国家的事象への既定受動曝露)は **感度分析・補助的仮定に限定**し、主分析では用いない。

### 3.2 二観測者マージ・パイプライン

`merge_paper2_data.py` が ChatGPT 出力と第 2 観測者出力を統合する。要点:

- **event_id によるマッチング**(無い場合は正規化名)。名前は `/` と `(` でのみ切る(COVID-19 のハイフン衝突を避ける)。
- **canonical premise への正規化**:US は `religion_race_region_education`、UK は `class_region_immigration_education`(LGBT は Section 28 と同性婚で分割)。
- 出力:`events_{tag}_merged.jsonl`(LOD0 合意)、`interpretations_{tag}.jsonl`(全 premise 解釈)、`disagreements_{tag}.jsonl`(観測者不一致)、`merge_report_{tag}.md`。`tag = country`(v1)または `country_grid`。

### 3.3 LOD 階層と CSP/SAT-UNSAT

ペルソナ生成は **LOD(Level of Detail)階層**の制約充足問題として実装する(`lod_persona.py`)。

- **LOD0** = 曝露構造(数理アンカー)。出生年 + CMR 解決済みモード列から計算される世代指紋。**捏造不能な固定点**。
- **LOD1** = 応答方向(Fight / Flight)、**LOD2** = 戦略、**LOD3** = 文脈(職業・地域・自己記述)。

生成器は (1) 決定論的制約整合検査(時間アンカー違反 = 公理 1)→ (2) LLM 生成 + LLM 自己 UNSAT 判定(公理 2)→ (3) **射影検証ループ**(公理 3:核事象の 70% 以上が provenance に現れるまで再生成、不足事象を次プロンプトへ差し戻す)を行う。閾値未達で max_retries 超過なら **UNSAT(projection)** を返す。これにより「数理アンカーに由来しないペルソナ」は構造的に拒否される。

### 3.4 指標:MFR と CDI

- **Mode Flip Rate(MFR)**:
  - *Event レベル* = 少なくとも一つの共同体間でモードが分岐した事象 / データのある事象。
  - *Cell レベル* = resolved mode が **base_mode_majority**(その事象の全 premise 解釈の最頻モード)と異なるセル / 観測セル。
  - 注:US/UK の merged は単一の base_mode_event を持たない(possible_modes のみ)。ゆえに flip 判定の基準は base_mode_majority に固定する。
- **Contextual Divergence Index(CDI)**:固定出生年で各共同体の 3 軸指紋を計算し、その**共同体間平均ユークリッド距離**を取る。共同体前提だけで世代指紋がどれだけ割れるかの尺度。

## 4. Data

### 4.1 設計された完全比較グリッド

探索的(v1)収集では premise 語彙が観測者間でバラバラになり、モード一致が偶然になる(US v1 でモード不一致はわずか 1 件)。そこで **共同体と事象を固定した完全グリッド**を設計した。

| | 共同体 × 事象 | セル | 設計 |
|---|---|---|---|
| **US grid** | 8 × 12 | 96 | 宗教 × 人種 × 地域 × 学歴 |
| **UK grid** | 9 × 13 | 117 | 階級 × 地域 × 移民世代 × EU 距離 |

DeepResearch 用の自己完結プロンプトは `docs/paper2_prompt_{us,uk}.md`、グリッド仕様は `docs/paper2_grid_spec.md`。

### 4.2 正準 premise(canonical premise)

各共同体は結合文字列で一意化する。例:

- US:`secular_white_coastal_graduate`(Coastal Liberal)、`evangelical_white_bible_belt_no_college`(Bible Belt)。
- UK:`middle_class_london_immigrant_2nd_gen_russell_group`(London Multicultural)、`working_class_leave_town_native_4plus_gen_no_qualifications`(Brexit Leave Town)。

両観測者が**同一 premise 文字列を共有**することで、初めてセル単位のモード不一致が測定可能になる(全リストは Appendix A)。

### 4.3 正直な復旧と限界(公理 4 の運用)

Gemini の出力は毎回シリアライズ破損し(`possible_modes` 空・`affected_groups` 配列崩壊)、決定論的修復器 `recover_gemini_jsonl.py` で復旧した。修復方針は **捏造しない**:premise を失った先頭共同体は解釈にせず、その rationale を `event_rationale_recovered` に退避する。結果、Gemini 側は **US 7/8・UK 8/9 共同体**しか回収できず、先頭の Coastal Liberal(US)/ London Multicultural(UK)は当初 **ChatGPT 単独**になった。

**Claude による第 2 観測者補完(2026-06-25)。** この欠落を ChatGPT 単独のまま残さず、**Claude を第 2 観測者として当該 2 共同体に投入**した(`generate_claude_observer.py` → `Claude_events_*_grid.jsonl`)。Claude は各 (event, community) を共同体前提から **独立に**解決し(ChatGPT の解釈を写さない)、merge は Claude を **解釈のみの追加観測者**として畳み込む(LOD0 の数値属性は ChatGPT×Gemini のまま不変。`source_model="claude"`)。結果、Coastal Liberal / London Multicultural は **2 観測者化**され、ChatGPT の一律 REFRAME(退化した単一観測)に対し、Claude×ChatGPT のモード不一致が **US 6 件 / UK 2 件**観測された。Claude は Gemini を**置換するのではなく補う**:Gemini の梱包破損で欠けた箇所を埋め、可能な箇所では将来 ChatGPT × Gemini × Claude の追加観測者として 3 観測者化しうる(§7.1)。

## 5. Results

### 5.1 同一事象 × 共同体 → モード変換マトリクス

固定 premise グリッドでモード変換マトリクスを描いた(Figure 1)。`—`(欠損)はゼロ、密な行列が得られた。

![US mode matrix](../figures/fig_p2_modematrix_us_grid.png)

### 5.2 Brexit:仮説どおりの共同体分岐と実 rationale

英国 Brexit 行は、共同体前提だけでモードが体系的に分岐した(実データ rationale を併記)。

| Community (premise) | mode | rationale(実出力・抜粋) |
|---|---|---|
| London Multicultural | **REFRAME** | 「開放的英国という所属基準が揺らぐ事件。欧州移動・多文化都市の当然性が書き換わった」(chatgpt) |
| University Remain (Oxbridge) | **REFRAME** | 「国の自己像・欧州への帰属の基準値が揺らぎ、アイデンティティの再定義を迫られる」(gemini) |
| Brexit Leave Town | **ACTIVE** | 「投票による意思表示と地域回復の選択として能動的に関与。主権回復が政治的自己効力感の軸に」(chatgpt) |
| N. England post-industrial | REF→**ACT**(観測者分岐) | chatgpt:「『声を取り戻す』経験」(REFRAME) / gemini:「エリート支配への反逆として Leave に投票、政治的動員」(ACTIVE) |
| Scotland | **REFRAME** | 「残留多数にもかかわらず強制離脱させられ、英国への所属意識が崩壊」(gemini) |
| NI Protestant | **ACTIVE** | 「連合王国の主権回復という大義に共鳴し、能動的に支持・適応」(gemini) |
| NI Catholic | **REFRAME** | 「ハードボーダー復活の危機により、和平合意に基づく所属のベースラインが揺らいだ」(gemini) |

北イングランド行は **観測者依存性そのもの**を示す:ChatGPT は Brexit を「基準値の書き換え(REFRAME)」、Gemini は「政治的動員(ACTIVE)」と解決した。同じ共同体・同じ事象でも、「出来事」相と「意味/行為」相で観測者が割れる。

### 5.4 同一入力ペルソナの分岐(Community 効果の単離)

CMR の眼目は「同じ人物入力でも、所属共同体が違えば別の世代経験になる」ことだ。これを最も純粋に見るため、**出生年 1985・応答 Fight・戦略「自分の選択で状況に介入する」を全条件で固定し、premise だけを変えて** LOD ペルソナを生成した(全 4 本 SAT、provenance 付き)。

**US:Coastal Liberal vs Bible Belt(同一入力)**

- *Coastal Liberal*(LOD0 指紋 P0.0 / A0.43 / R0.43、**ChatGPT × Claude の 2 観測者**):ChatGPT は全 12 事象を一律 REFRAME と解決していた(退化した単一観測)。Claude を第 2 観測者として投入すると(§4.3)、Obama 当選・Sandy Hook・Student Debt・Housing Surge を **ACTIVE 分岐**、Civil Rights Act・COVID を **PASSIVE** と独立解決し、6 事象でモードが分かれた。再生成された persona はこの 2 観測者 LOD0 を反映し、「Lehman の参照点書き換えと Obama 当選の能動分岐が同時期に干渉し、投票・職業選択・公共的発言で介入する感覚が形成された」と、ACTIVE 事象を取り込んだ provenance になる。**観測者を一つ足すだけで、退化した単一モード列が分化し、世代経験の解像度が上がる。**
- *Bible Belt*(P0.0 / **A0.387** / R0.0、観測者不一致 7/12 を tie-break):同じ Fight 入力でも「**16 歳の 9.11 が能動分岐として着弾**し、政治を自分で引き受ける土台ができた」と、9.11 を ACTIVE として引き受ける。

→ **同一の自己記述入力(Fight)が、共同体前提を変えるだけで、まったく異なる provenance に解決される。** Coastal は「REFRAME の累積として」、Bible Belt は「ACTIVE 分岐の引き受けとして」同じ Fight を正当化する。これが Contextual Mode Resolver の作動証拠である。

**UK:London Multicultural vs Brexit Leave Town(同一入力)**

- 両者とも projection consistency(core 事象カバー率)100% で SAT。London Multicultural は Gemini 欠損の先頭共同体だったが、**Claude を第 2 観測者として補完済み**(§4.3;Claude×ChatGPT のモード不一致は Austerity・COVID の 2 件)。Leave Town は ChatGPT×Gemini の解決。London は Section 28 撤廃・7/7 を若年期の参照点書き換えとし、生活費危機・NHS 危機で Fight が現れる。Leave Town は 2008 危機・緊縮を参照点書き換え、スコットランド独立投票を能動分岐とし「黙って耐えるより投票・発言・地域内判断で押し返す」。共同体前提が干渉構造(どの事象がどの年齢で重なるか)を変え、同じ Fight でも別の事象群に支えられる。

ペルソナ全文は `data/personas_grid/{us_coastal_liberal, us_bible_belt, uk_london_multicultural, uk_brexit_leave_town}.txt`。

## 6. Discussion

### 6.1 三つの仮説の検証

- **H1(モードは事象に固有でない)**:支持。Event-level MFR 100%、全争点事象が共同体間でモード分岐(§5.1)。
- **H2(共同体前提がモード変換を駆動する)**:支持。Brexit の階級・地域・EU 距離による分岐(§5.2)、CDI 0.32–0.34 の指紋発散(§5.3)、同一入力ペルソナの provenance 分岐(§5.4)。
- **H3(観測者依存性は構造的情報である)**:支持。premise 固定下で観測者間不一致が 1 → 49/48 件へ顕在化し(§5.1)、北イングランド Brexit のように「出来事/意味」相の割れとして解釈可能(§5.2)。

### 6.2 観測者依存性は欠陥ではなく特徴

二つの LLM が同じ事象を別モードに解決するとき、素朴には「どちらが正しいか」を問いたくなる。本研究の立場は異なる:**両方とも、その観測スタンスにおいて正しい**。ChatGPT は「出来事」を、Gemini は「社会的意味」を解決する。両者の差は、事象がコミュニティ内で「環境として受けたか/行為として引き受けたか/基準として書き換えたか」の多義性そのものを写し取る。これは、複数の妥当な解釈経路が同一の事象を異なる作用相として保持しうるという、本稿の構造主義的立場に対応する。

### 6.3 Paper 1 との関係

Paper 1 は構造層(集団曝露構造)を確立した。本稿は Community 層を実証的に駆動し、`Event.mode` を固定値から作用素へ持ち上げた。Paper 1 の世代指紋は「ある共同体前提での CMR 解決の特殊例(あるいは全 premise 集約)」として再解釈できる。SCEM 全体の射程(個人内面・自己効力感はスコープ外)は本稿でも不変である。

### 6.4 倫理的位置づけ:相互理解のための SCEM

本稿の倫理宣言は、付け足しの注意書きではない。それは **Honest Structuralism(§2.4)を人間の解釈差に適用したときの実践倫理そのもの** である。§2.4 の 4 公理は、データ生成の整合性規則であると同時に、人の意味世界に対してモデルが取るべき姿勢でもある。

**Anchor Preservation ── 個人の感じ方を、まず消さない。**
ある社会事象が、その人にとって PASSIVE / ACTIVE / REFRAME のどれとして着弾したかを、最初にアンカーとして保存する。たとえば同性婚合法化に対して、「当然の社会進歩」と感じた人、「共同体規範への挑戦」と感じた人、「長い排除の歴史が書き換わった」と感じた人 ── それぞれの着弾を、裁く前に、まず保存する。「それは違う」「勘違いだ」「被害妄想だ」で消さない。

**Non-overwrite ── 「説明の暴力」を避ける。**
「馬鹿だから」「偏っているから」「田舎だから」「宗教に洗脳されているから」で意味生成を上書きしない。SCEM は「この人はこう考える → だから愚かだ」へ進まず、「この人はこう考える → どの年齢で、どの共同体で、どの規範コードの中で、何を実体曝露/情報曝露として受けたのか」へ降りる。ラベルを貼るのではなく、来た道を見る。

**Projection Consistency ── 表面の意見差から、来歴の LOD0 へ降りられる。**
賛成/反対、リベラル/保守、都市/地方、移民賛成/移民反対 ── 表層はこう見える。SCEM はこれを直接ラベル化して固定せず、年齢同期・Community・Code・Material Exposure・Informational Exposure・REFRAME anchor・interference node へ射影する。意見差をそのまま固定せず、**どの構造からその差が投影されているか**を見る。

**Provenance Traceability ── 違いの来歴を辿れる。**
「この人はこういう属性だからこう考える」ではなく、何歳で・何を見て・何を許され・何を禁じられ・何を身体化し・何をニュースとして浴び・何が生活を変え・何が基準値を書き換えたか、を辿る。だから対立する意見に対して「あなたと私は違う。**でも、その違いには来歴がある**」と言える。

ここで重要なのは、**これが「相手の主張を全部正しいと認める」道具ではない**ことだ。SCEM が保証するのは「あなたの主張は正しい」ではなく「その主張が生まれた曝露構造は辿れる」である。優しいが甘くない ── 相手の意味生成を上書きしないが、合意を強制もしない。同じ Brexit が共同体ごとに別モードへ解決されるという本稿の知見は、「どちらが正しく世界を見ているか」ではなく「各共同体がどの参照点からその事象を生きたか」を可視化するために用いられるべきである。

#### 誤用防止

このモデルは強力であり、悪用すれば「この共同体にはこの刺激を当てれば動く」という**操作モデル**にもなりうる。それを防ぐため、設計段階から次の四つの線を明記する。

| 守る | 退ける |
|---|---|
| 分類ではなく **理解** | 人を属性で分類して終える |
| 操作ではなく **翻訳** | 共同体を動かすための刺激設計 |
| 断定ではなく **来歴追跡** | 個人内面の断定 |
| 分断ではなく **相互理解** | 対立の固定化・正当化 |

SCEM の出力は常に「ある出生年・共同体・嗜好・制度環境に置かれた人が、どのような曝露構造を**持ちやすいか**」の推定であって、特定個人の内面の断定ではない(`docs/exposure_adapters_spec.md` §3 と一致)。

> **Ethical orientation: SCEM as a tool for interpretive understanding.** SCEM is not intended to classify individuals, overwrite their stated experiences, or reduce disagreement to moral or cognitive deficiency. In accordance with Honest Structuralism, the model preserves each interpretive anchor, avoids replacing a person's meaning-making with dismissive labels, projects surface-level disagreement back to lower-level exposure structures, and makes the provenance of difference traceable through age, community, normative code, material exposure, informational exposure, and embodied reference points. In this sense, SCEM is a tool for understanding why people may inhabit different meaning-worlds despite encountering the same social event. Its purpose is not to harden social divisions, but to provide a translation map for mutual understanding.

## 7. Limitations

### 7.1 第 2 観測者の品質と置き換え

Gemini は出力を毎回シリアライズ破損させ(梱包の問題であって判定内容の問題ではない、§2.3)、決定論復旧でも各事象の先頭共同体を失った(US 7/8・UK 8/9)。先頭の Coastal Liberal / London Multicultural は当初 ChatGPT 単独となり観測者依存性が測れなかったが、**Claude を第 2 観測者として投入し 2 観測者化を完了した**(§4.3)。残る共同体は現状 ChatGPT×Gemini の 2 観測者である。**方針は Gemini の置換ではなく複数観測者化**:Gemini の回収済み内容は保持しつつ、破損耐性のある Claude を追加し、可能な箇所を **ChatGPT × Gemini × Claude** の 3 観測者へ拡張する。merge パイプラインは Claude を解釈のみの追加観測者として畳み込めるため(`Claude_events_*.jsonl`)、拡張でも LOD0 数値は保たれる。なお Claude 観測者の判定は本稿著者(Claude)による LLM-as-annotator であり、人手検証は Prolific(§7.3)に委ねる。

### 7.2 「100%」の正しい読み方

Event-level MFR 100% は **「ランダムな全社会事象」ではなく「選定した高争点事象集合」での値**である。規範コードが鋭く割れる事象を意図的に選んだ結果であり、社会事象全体の母数を代表しない。論文本文では必ず "in selected high-contention events" と限定する。

### 7.3 実証(Prolific)はまだ無い

CMR の解決モードは LLM 観測者の判定であり、実在の個人回答による検証(Prolific パネル)はまだ行っていない。§5.4 のペルソナは「LOD0 に由来追跡可能な構造的に整合な生成」であって、実在人物の記述ではない。CDI・MFR は固定 premise・選定事象上の指標であり、母集団推定ではない。

### 7.4 単一出生年・単一戦略のデモ

§5.3–5.4 は 1985 年生まれ・Fight 固定の単離デモである。出生年や応答方向を動かしたときの CMR 挙動の網羅は将来課題。

## 8. Future Work:Dynamic SCEM と情報曝露構造

将来の拡張は、**実体曝露構造(material exposure structure)と情報曝露構造(informational exposure structure)を区別する**ことから始めるべきである。

- **実体曝露**:制度的・経済的・物理的・インフラ的な直接の着弾 ── 雇用、就学、住宅、災害被害、法的地位、公衆衛生上の規制など。
- **情報曝露**:ニュース・メディア・社会的言説・象徴的注目を介した曝露。

GDELT のような大規模インフラは、**情報曝露構造の自動化レイヤ**として扱うべきであって、生きられた実体曝露の直接の測定とみなしてはならない。GDELT 系は、メディア観測された salience(顕著性)、tone trajectory(論調の推移)、burstiness(集中度)、地理的拡散、effective attention year(実効注目年)などを支援しうるが、実体曝露の測定には労働統計・政策実施記録・住宅価格・公衆衛生データ・災害被害記録といった補完的データセットが要る。

この区別により、SCEM は静的な事象データベースから、**情報曝露を自動取得しつつ実体曝露を別系統で接地する動的モデル(Dynamic SCEM)** へ拡張できる。観測者依存性(§2.3)も、この枠組みでは「情報曝露の観測スタンスの差」として自然に位置づけられる。

### 8.1 層構成:Core / CMR / Exposure Adapters

拡張は本体を肥大させず、**差し替え可能な曝露供給層(Exposure Adapters)** を Core/CMR の下に置く形で行う。本体(Core/CMR)は曝露の出自に依存せず、正規化済み Event レコードのみを受け取る。

```text
SCEM Core      年齢同期 / 3作用モード / effect_vector / interference / REFRAME fire   (Paper 1, 実装済)
CMR Layer      Community / Code / premise / resolved_mode / rationale                (Paper 2, 実装済)
Exposure
 Adapters      curated_event_db(済)/ DeepResearch grid(済)/ official_statistics /
               policy_datasets / gdelt_adapter(情報曝露・仕様のみ)                  (将来)
```

GDELT のような大規模インフラは **本体の中核に置かず、Information Exposure Adapter の仕様**に留める(無料 API・運用制約に本体設計が引きずられるのを避けるため)。GDELT Adapter の入出力契約は `media_observed_salience / tone_trajectory / burstiness / geographic_spread / language_spread / effective_attention_year / candidate_reframe_periods` を出力し、**実体曝露構造・個人の心理状態・実際の制度/生活影響の完全測定は非対象**とする。REFRAME の発火判定は Adapter ではなく Core の reference_value 差分式が行い、Adapter は候補期間を提示するに留める。詳細仕様は [`docs/exposure_adapters_spec.md`](exposure_adapters_spec.md)。

### 8.2 統合の原則

実体曝露と情報曝露は別系統で観測し、**最後に Core の effect_vector 上で統合する**。情報曝露は salience と effective_attention_year を、実体曝露は effect_vector の実体成分と reference_value を供給する。どちらか一方では Event は完成しない。「報道が多い = 生活が変わった」という誤った等値を、この分離が構造的に防ぐ。当面は GDELT を Future 仕様に留め、**US/UK 完全グリッド版 CMR の確立を最優先**とする。

## 9. Conclusion

作用モードは事象に固有ではない。同じ Brexit が、ロンドン移民二世には所属基準の書き換えとして、Leave タウン労働者には投票による意思表示として着弾する。本稿は Contextual Mode Resolver によってこの文脈依存モード問題を計算可能にし、二観測者の不一致を消さずに observer-dependence として測り、Honest Structuralism の 4 公理で生成を数理アンカーに縛った。米英の設計済みグリッド(96 / 117 セル)で、争点事象の Event-level Mode Flip Rate は両国 100%、共同体間指紋発散 CDI は 0.32–0.34、そして同一入力ペルソナが premise だけで体系的に分岐することを示した。「同じ出来事を、別の世代経験へ変換する装置としての共同体」が、測定可能な対象になった。実在個人による検証は Paper 3(Prolific)に委ねる。

  let out = marked.parse(protectedMd);
  // 3) 数式を復元
  out = out.replace(/@@MJ(\d+)@@/g, (m,i)=>store[+i]);
  document.getElementById('content').innerHTML = out;
